# Git hooks. Install once with: lefthook install
# Kept deliberately minimal — no npm/commitlint, matching the zero-dependency rule for tooling.

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.swift"
      run: swift format lint --strict --recursive Sundial SundialTests
    swiftlint:
      glob: "*.swift"
      run: swiftlint --quiet --strict

commit-msg:
  commands:
    conventional:
      # head -n1: only the subject line must be Conventional-Commits-formatted, not any body line.
      run: >
        head -n1 {1} |
        grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9-]+\))?!?: .+' ||
        (echo "Commit message must follow Conventional Commits, e.g. 'feat: add settings window'
        or 'fix(scheduler): recompute on wake'." && exit 1)
